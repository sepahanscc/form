<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>سپاهان</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx/dist/xlsx.full.min.js"></script>
    <style>
        /* ... همان استایل‌های قبلی ... */
    </style>
</head>
<body>
    <!-- هدر -->
    <div class="header">
        <img src="sepahan-logo.png" alt="Sepahan Logo" class="sepahan-logo">
        <h1>سیستم ارزیابی بازیکنان سپاهان</h1>
    </div>

    <!-- صفحه ورود -->
    <div id="login-screen">
        <div class="card">
            <h2>🔐 ورود به سیستم ارزیابی</h2>
            <label>نام ارزیاب</label>
            <input id="evaluator-name" type="text" placeholder="نام و نام خانوادگی">
            <label>کد دسترسی</label>
            <input id="access-code" type="password" placeholder="SP001 تا SP004">
            <br>
            <button class="btn btn-primary" onclick="doLogin()" style="width:100%">ورود</button>
            <div id="login-err"></div>
        </div>
    </div>

    <!-- برنامه اصلی -->
    <div id="app">
        <div class="container">
            <!-- ... بقیه کدها ... -->
        </div>
    </div>

    <script>
        // کدهای دسترسی
        const CODES = { SP001: 'مدیر آنالیز', SP002: 'سرمربی', SP003: 'مدیر فنی', SP004: 'آنالیست عملکرد' };

        // تابع ورود اصلاح‌شده
        function doLogin() {
            const name = document.getElementById('evaluator-name').value.trim();
            const code = document.getElementById('access-code').value.trim().toUpperCase();
            if (!name) {
                showLoginErr('نام ارزیاب را وارد کنید');
                return;
            }
            if (!CODES[code]) {
                showLoginErr('کد دسترسی نامعتبر است');
                return;
            }
            document.getElementById('login-screen').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('f-date').valueAsDate = new Date();
        }

        // تابع نمایش خطای ورود (اصلاح‌شده)
        function showLoginErr(msg) {
            document.getElementById('login-err').innerHTML = `<div class="alert alert-err">${msg}</div>`;
        }

        // ... بقیه توابع با اصلاح backticks ...
    </script>
</body>
</html>
